version: "2"
sql:
  - engine: "postgresql"
    schema: "db/schema/schema.sql"
    queries: "db/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/adapter/postgres/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "pet_species"
            go_type: "string"
          - db_type: "pet_status"
            go_type: "string"
