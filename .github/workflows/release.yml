name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build & test
        run: |
          go build ./...
          go test ./...

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      # The container image lives at deploy/docker/Dockerfile and is built with the
      # repository root as context (same as `minikube image build`).
      - name: Set up Buildx
        if: ${{ hashFiles('deploy/docker/Dockerfile') != '' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ hashFiles('deploy/docker/Dockerfile') != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR image references must be lowercase; the repository slug is not.
      - name: Compute image name
        if: ${{ hashFiles('deploy/docker/Dockerfile') != '' }}
        id: image
        run: echo "repo=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        if: ${{ hashFiles('deploy/docker/Dockerfile') != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.repo }}:${{ github.ref_name }}
            ${{ steps.image.outputs.repo }}:latest
