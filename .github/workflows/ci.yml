name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: petstore
          POSTGRES_PASSWORD: petstore
          POSTGRES_DB: petstore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U petstore"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Verify modules
        run: |
          go mod download
          go mod verify
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (race detector)
        run: go test -race ./...
        env:
          TEST_DATABASE_URL: postgres://petstore:petstore@localhost:5432/petstore_test?sslmode=disable

  lint:
    runs-on: ubuntu-latest
    env:
      GOLANGCI_VERSION: v2.12.2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" "$GOLANGCI_VERSION"
      - name: Lint
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          golangci-lint run ./...
