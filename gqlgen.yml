schema:
  - internal/graph/schema/*.graphqls

exec:
  filename: internal/graph/generated/exec.go
  package: generated

model:
  filename: internal/graph/generated/models_gen.go
  package: generated

resolver:
  layout: follow-schema
  dir: internal/graph
  package: graph
  filename_template: "{name}.resolvers.go"

# GraphQL models are generated; domain types have different shapes and are mapped
# explicitly in the resolvers, so nothing is auto-bound.
autobind: []

omit_slice_element_pointers: true

models:
  Upload:
    model: github.com/99designs/gqlgen/graphql.Upload
  Time:
    model: github.com/99designs/gqlgen/graphql.Time
  Pet:
    fields:
      pictureUrl:
        resolver: true
    extraFields:
      PictureObjectKey:
        type: string
  PublicPet:
    fields:
      pictureUrl:
        resolver: true
    extraFields:
      PictureObjectKey:
        type: string
