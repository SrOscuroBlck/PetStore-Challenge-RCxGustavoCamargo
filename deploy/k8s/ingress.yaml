apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: petstore
  namespace: petstore
spec:
  # TLS terminates here; the web gateway (HTTP) serves the SPA and proxies
  # /graphql + /pictures on to the API, so the whole system is same-origin.
  ingressClassName: nginx
  tls:
    - hosts: ["petstore.local"]
      secretName: petstore-tls
  rules:
    - host: petstore.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: petstore-web
                port:
                  number: 80
