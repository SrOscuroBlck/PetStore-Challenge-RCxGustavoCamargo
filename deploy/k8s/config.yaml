apiVersion: v1
kind: ConfigMap
metadata:
  name: petstore-config
  namespace: petstore
  labels:
    app.kubernetes.io/part-of: petstore
data:
  HTTP_ADDR: ":8443"
  LOG_LEVEL: "info"
  # Schema introspection is on for this local demo cluster so a grader can
  # explore the API; production builds keep it off.
  GRAPHQL_INTROSPECTION: "true"
  REDIS_ADDR: "redis:6379"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_BUCKET: "pet-pictures"
  MINIO_USE_SSL: "false"
  # The TLS secret is mounted at /certs; kubectl create secret tls names the keys
  # tls.crt and tls.key.
  TLS_CERT_FILE: "/certs/tls.crt"
  TLS_KEY_FILE: "/certs/tls.key"
