# In-cluster k6 load test for the whole customer path — frontend (SPA shell) and
# backend (catalog read). Run via `make load-test` (after `make k8s-up`), which
# (re)creates the `petstore-loadtest-script` ConfigMap from loadtest/storefront.js
# and substitutes the VUS/DURATION placeholders below. Running inside the cluster
# keeps a `kubectl port-forward` proxy out of the measurement, so the latency
# reflects the real storefront-gateway -> API -> Redis -> Postgres path.
apiVersion: batch/v1
kind: Job
metadata:
  name: petstore-loadtest
  namespace: petstore
  labels:
    app.kubernetes.io/part-of: petstore
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: petstore-loadtest
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:0.49.0
          command: ["k6", "run", "/scripts/storefront.js"]
          env:
            # The same-origin storefront gateway: the exact origin a browsing
            # customer hits (nginx serves the SPA and injects the ambient browse
            # credential for the catalog read).
            - name: GATEWAY_URL
              value: "http://petstore-web"
            - name: STORE_ID
              value: "11111111-1111-1111-1111-111111111111"
            - name: VUS
              value: "__VUS__"
            - name: DURATION
              value: "__DURATION__"
          volumeMounts:
            - name: script
              mountPath: /scripts
      volumes:
        - name: script
          configMap:
            name: petstore-loadtest-script
