apiVersion: apps/v1
kind: Deployment
metadata:
  name: petstore-api
  namespace: petstore
  labels:
    app: petstore-api
    app.kubernetes.io/part-of: petstore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: petstore-api
  template:
    metadata:
      labels:
        app: petstore-api
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
        - name: wait-for-minio
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z minio 9000; do echo waiting for minio; sleep 2; done"]
        # Migrations run to completion before the api container starts, so the
        # API never serves traffic against an unmigrated database. Atlas takes a
        # lock, so this is idempotent across restarts and replicas.
        - name: atlas-migrate
          image: arigaio/atlas:latest
          args: ["migrate", "apply", "--url", "$(DATABASE_URL)", "--dir", "file:///migrations"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: petstore-api-secret
                  key: DATABASE_URL
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
      containers:
        - name: api
          image: petstore-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
          envFrom:
            - configMapRef:
                name: petstore-config
            - secretRef:
                name: petstore-api-secret
            - secretRef:
                name: petstore-minio-secret
          volumeMounts:
            - name: tls
              mountPath: /certs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: migrations
          configMap:
            name: petstore-migrations
        - name: tls
          secret:
            secretName: petstore-tls
---
apiVersion: v1
kind: Service
metadata:
  name: petstore-api
  namespace: petstore
  labels:
    app: petstore-api
spec:
  type: ClusterIP
  selector:
    app: petstore-api
  ports:
    - name: https
      port: 8443
      targetPort: 8443
